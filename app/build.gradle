buildscript {
    ext.kotlin_version = '1.4.30'
    repositories {
       google()
       jcenter()
    }
    dependencies {
        classpath 'com.android.tools.build:gradle:4.1.2'
        classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"
    }
}

allprojects {
    repositories {
        google()
        jcenter()
        maven { url "https://jitpack.io" }
    }
}

apply plugin: 'com.android.application'
apply plugin: 'kotlin-android'
apply plugin: 'kotlin-android-extensions'

android {
    compileSdkVersion 29

    defaultConfig {
        applicationId "ru.nsu.bobrofon.easysshfs"
        minSdkVersion 14
        targetSdkVersion 29
        versionCode 70
        versionName "0.5.5"
    }
    buildTypes {
        release {
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
        }
    }

    flavorDimensions 'abi'

    productFlavors {
        arm {
            dimension "abi"
            ndk.abiFilters 'armeabi-v7a'
            versionCode android.defaultConfig.versionCode
        }
        x86 {
            dimension "abi"
            ndk.abiFilters 'x86'
            versionCode android.defaultConfig.versionCode + 2
        }
        arm64v8a {
            dimension "abi"
            ndk.abiFilters 'arm64-v8a'
            versionCode android.defaultConfig.versionCode + 3
        }
        x86_64 {
            dimension "abi"
            ndk.abiFilters 'x86_64'
            versionCode android.defaultConfig.versionCode + 4
        }
        armv7a {
            dimension "abi"
            ndk.abiFilters 'armeabi-v7a'
            versionCode android.defaultConfig.versionCode + 1
        }
    }
}

dependencies {
    implementation fileTree(dir: 'libs', include: ['*.jar'])
    implementation 'androidx.appcompat:appcompat:1.2.0'
    implementation 'androidx.legacy:legacy-support-v4:1.0.0'
    implementation 'com.github.topjohnwu:libsu:1.1.1'
    implementation "org.jetbrains.kotlin:kotlin-stdlib-jdk7:$kotlin_version"
}
